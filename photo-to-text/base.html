<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

    <title>Image To Text Extractor</title>
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center">

    <div class="bg-white shadow-lg rounded-xl p-6 w-[700px]">

        <h1 class="text-3xl font-bold text-center mb-6">
            Image To Text Extractor
        </h1>

        <input
            id="input"
            type="file"
            accept="image/*"
            class="w-full border p-3 rounded-lg mb-4"
        >

        <button
            id="btn"
            onclick="textextractor()"
            class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700"
        >
            Extract Text
        </button>

        <div
            id="div"
            class="mt-5 min-h-[200px] border rounded-lg p-4 bg-gray-50 whitespace-pre-wrap"
        >
            Extracted text will appear here...
        </div>

    </div>

    <script src="practice.js"></script>

</body>
</html>
